<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | My Name is Zheni</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="controls">
      <!-- Search input to filter episodes -->
      <input type="text" id="search-input" placeholder="Search episodes..." />
      <!-- Dropdown to filter by season -->
      <select id="season-filter">
        <option value="all">All Seasons</option>
        <!-- Options will be populated dynamically -->
      </select>
      <!-- Display the filtered count / total count -->
      <div id="status-message" class="status-message"></div>
    </div>
    <div id="root"></div>
    <div id="episodes-container"></div>

    <script src="episodes.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
